<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Alumnos</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h2>Cargar Alumno</h2>
    <form id="alumnoForm">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="number" id="edad" placeholder="Edad" required>
        <input type="number" id="nota" placeholder="Nota" step="0.1" required>
        <button type="submit">Cargar y Recargar</button>
    </form>

    <h2>Lista de Alumnos</h2>
    <table id="tablaAlumnos">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const form = document.getElementById('alumnoForm');
        const tabla = document.querySelector('#tablaAlumnos tbody');

        // Función para obtener, ordenar y mostrar datos
        function actualizarInterfaz() {
            const alumnos = JSON.parse(localStorage.getItem('alumnos')) || [];
            
            // Ordenar por Nota (descendente) y luego por Nombre (ascendente)
            alumnos.sort((a, b) => {
                if (b.nota !== a.nota) return b.nota - a.nota;
                return a.nombre.localeCompare(b.nombre);
            });

            tabla.innerHTML = alumnos.map(a => `
                <tr>
                    <td>${a.nombre}</td>
                    <td>${a.edad}</td>
                    <td>${a.nota}</td>
                </tr>
            `).join('');
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const nuevoAlumno = {
                nombre: document.getElementById('nombre').value,
                edad: parseInt(document.getElementById('edad').value),
                nota: parseFloat(document.getElementById('nota').value)
            };

            const alumnos = JSON.parse(localStorage.getItem('alumnos')) || [];
            alumnos.push(nuevoAlumno);
            localStorage.setItem('alumnos', JSON.stringify(alumnos));
            
            // Recargar la página para cumplir con el requerimiento
            location.reload();
        };

        // Cargar datos al iniciar
        actualizarInterfaz();
    </script>
</body>
</html>
